# GoReleaser builds the cross-platform binaries so nobody needs Go to USE `rc` — tag `vX.Y.Z`, push,
# and the release workflow (.github/workflows/release.yml) cross-compiles and attaches archives +
# checksums to the GitHub Release. `go install` stays the path for people who already have Go.
#   docs: https://goreleaser.com
version: 2

project_name: rootcause-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: rc
    main: ./cmd/rc
    binary: rc
    env:
      - CGO_ENABLED=0 # static binaries — no libc dependency, run anywhere
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: rc
    # e.g. rc_0.1.0_darwin_arm64.tar.gz
    name_template: "rc_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: rootcause-org
    name: rootcause-cli

# --- Homebrew ----------------------------------------------------------------
# Publishes a `brew install rootcause-org/tap/rc` formula on every release by committing
# Formula/rc.rb to rootcause-org/homebrew-tap. Two one-time prerequisites (both done):
#   1. public repo rootcause-org/homebrew-tap exists
#   2. repo secret HOMEBREW_TAP_GITHUB_TOKEN holds a token with contents:write on homebrew-tap —
#      the default GITHUB_TOKEN is scoped to *this* repo only and can't push to a second one.
#      Wired into release.yml's env block.
#
# NOTE: `brews` (a formula) is deprecated in GoReleaser in favor of `homebrew_casks`. We deliberately
# keep the formula: casks are macOS-only, but a formula installs our static binary on Linuxbrew too —
# and the README promises macOS *and* Linux. `goreleaser check` flags this as deprecated, but
# `goreleaser release` (what CI runs) only warns and still publishes. Do NOT migrate to a cask without
# accepting the loss of Linux `brew install`.
brews:
  - name: rc
    repository:
      owner: rootcause-org
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/rootcause-org/rootcause-cli"
    description: "Thin scriptable client over rootcause's /api/v1 — consume your project's own run data"
    install: |
      bin.install "rc"
    test: |
      system "#{bin}/rc", "--version"
